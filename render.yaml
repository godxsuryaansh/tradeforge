services:
  - type: web
    name: tradeforge-bot
    runtime: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false

